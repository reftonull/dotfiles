# workmux global config

# Worktrees live in .trees/ inside the repo
worktree_dir: .trees

# Use basename strategy (feature/auth-flow -> auth-flow)
worktree_naming: basename

# Each worktree gets its own tmux session
mode: session

# Default agent
agent: claude

# Pane layout: agent on top (focused), shell below
panes:
  - command: <agent>
    focus: true
  - split: horizontal
    size: 20
nerdfont: true
